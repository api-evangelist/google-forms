aid: google-forms
name: Google Forms
description: >-
  The Google Forms API is a RESTful interface that lets you create and modify
  Google Forms programmatically, read form responses, set up watches for
  notifications on form changes and new responses, and integrate forms with
  external applications.
url: https://developers.google.com/forms/api
type: Index
