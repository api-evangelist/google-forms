naftiko: "1.0.0-alpha1"

info:
  label: "Google Forms API"
  description: "Create and modify Google Forms, read form responses, and manage watches for notifications."
  tags:
    - Google Forms
    - Surveys
    - Forms
    - Responses
  created: "2026-04-18"
  modified: "2026-04-18"

binds:
  - namespace: env
    keys:
      GOOGLE_FORMS_API_KEY: GOOGLE_FORMS_API_KEY

capability:
  consumes:
    - type: http
      namespace: forms-api
      baseUri: https://forms.googleapis.com
      description: "Google Forms API v1 for managing forms, responses, and watches."
      authentication:
        type: bearer
        token: "{{GOOGLE_FORMS_API_KEY}}"
      resources:
        - name: forms
          path: /v1/forms
          description: "Form management operations"
          operations:
            - name: create-form
              method: POST
              description: "Create a new form"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  info:
                    title: "{{tools.title}}"
            - name: get-form
              method: GET
              description: "Get a form by ID"
              inputParameters:
                - name: formId
                  in: path
                  type: string
                  required: true
                  description: "The ID of the form"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: batch-update-form
              method: POST
              description: "Batch update a form with multiple changes"
              inputParameters:
                - name: formId
                  in: path
                  type: string
                  required: true
                  description: "The ID of the form"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  requests: "{{tools.requests}}"
            - name: set-publish-settings
              method: POST
              description: "Update publish settings for a form"
              inputParameters:
                - name: formId
                  in: path
                  type: string
                  required: true
                  description: "The ID of the form"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  publishSettings: "{{tools.publishSettings}}"
        - name: responses
          path: /v1/forms/{formId}/responses
          description: "Form response operations"
          operations:
            - name: list-responses
              method: GET
              description: "List form responses"
              inputParameters:
                - name: formId
                  in: path
                  type: string
                  required: true
                  description: "The ID of the form"
                - name: pageSize
                  in: query
                  type: integer
                  required: false
                  description: "Maximum number of responses"
                - name: pageToken
                  in: query
                  type: string
                  required: false
                  description: "Pagination token"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: get-response
              method: GET
              description: "Get a single form response"
              inputParameters:
                - name: formId
                  in: path
                  type: string
                  required: true
                  description: "The ID of the form"
                - name: responseId
                  in: path
                  type: string
                  required: true
                  description: "The response ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: watches
          path: /v1/forms/{formId}/watches
          description: "Watch management operations"
          operations:
            - name: create-watch
              method: POST
              description: "Create a new watch for notifications"
              inputParameters:
                - name: formId
                  in: path
                  type: string
                  required: true
                  description: "The ID of the form"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  watch: "{{tools.watch}}"
            - name: list-watches
              method: GET
              description: "List watches for a form"
              inputParameters:
                - name: formId
                  in: path
                  type: string
                  required: true
                  description: "The ID of the form"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: delete-watch
              method: DELETE
              description: "Delete a watch"
              inputParameters:
                - name: formId
                  in: path
                  type: string
                  required: true
                  description: "The ID of the form"
                - name: watchId
                  in: path
                  type: string
                  required: true
                  description: "The watch ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: renew-watch
              method: POST
              description: "Renew a watch for seven more days"
              inputParameters:
                - name: formId
                  in: path
                  type: string
                  required: true
                  description: "The ID of the form"
                - name: watchId
                  in: path
                  type: string
                  required: true
                  description: "The watch ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8100
      namespace: forms-api-rest
      resources:
        - path: /v1/forms
          name: forms
          description: "Google Forms management"
          operations:
            - method: POST
              name: create-form
              description: "Create a new form"
              call: "forms-api.create-form"
            - method: GET
              name: get-form
              description: "Get a form"
              call: "forms-api.get-form"

    - type: mcp
      port: 9100
      namespace: forms-api-mcp
      transport: http
      tools:
        - name: create-form
          description: "Create a new Google Form"
          hints:
            readOnly: false
          call: "forms-api.create-form"
        - name: get-form
          description: "Get a Google Form by ID"
          hints:
            readOnly: true
          call: "forms-api.get-form"
        - name: batch-update-form
          description: "Batch update a Google Form"
          hints:
            readOnly: false
          call: "forms-api.batch-update-form"
        - name: list-responses
          description: "List responses for a form"
          hints:
            readOnly: true
          call: "forms-api.list-responses"
        - name: get-response
          description: "Get a single form response"
          hints:
            readOnly: true
          call: "forms-api.get-response"
        - name: create-watch
          description: "Create a notification watch"
          hints:
            readOnly: false
          call: "forms-api.create-watch"
        - name: list-watches
          description: "List notification watches"
          hints:
            readOnly: true
          call: "forms-api.list-watches"
        - name: delete-watch
          description: "Delete a notification watch"
          hints:
            destructive: true
          call: "forms-api.delete-watch"
        - name: renew-watch
          description: "Renew a notification watch"
          hints:
            readOnly: false
          call: "forms-api.renew-watch"
